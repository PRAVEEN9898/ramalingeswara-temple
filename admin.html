<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sri Ramalingeswara Swamy Temple</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="admin-login-body">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Admin Login</h2>
                <p>Sri Ramalingeswara Swamy Temple</p>
            </div>
            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" id="adminUserId" placeholder="Enter User ID" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter Password" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div class="login-footer">
                <p>User ID: RAMALINGESARA_TEMPLE@ADMIN</p>
                <p>Password: HARAHARAMAHADEV@123</p>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
