<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sri Ramalingeswara Swamy Temple</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                <span>Temple Admin</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="donate.html" class="nav-link">Donate</a></li>
                <li><a href="dashboard.html" class="nav-link active">Admin</a></li>
            </ul>
        </div>
    </nav>

    <section class="admin-donations-section">
        <div class="container">
            <h2>Manual Donor Entry</h2>

            <div class="donation-admin-form">
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" id="adminDonorName" placeholder="Donor Name *">
                    </div>
                    <div class="form-group">
                        <input type="number" id="adminDonorAmount" placeholder="Amount (₹) *" min="1">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <input type="date" id="adminDonorDate">
                    </div>
                    <div class="form-group">
                        <select id="adminPaymentMethod">
                            <option value="Cash" selected>Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="Card">Card</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <input type="text" id="adminTransactionId"
                           placeholder="Transaction ID / UTR (optional)">
                </div>

                <div class="form-group">
                    <input type="text" id="adminNotes"
                           placeholder="Notes (committee member / details, optional)">
                </div>

                <button type="button" class="cta-button" onclick="adminAddDonor()">
                    Add Donor Manually
                </button>
            </div>

            <hr>

            <h2>Donations List</h2>
            <table id="adminDonationsTable" class="donations-table" border="1">
                <thead>
                    <tr>
                        <th>Donor Name</th>
                        <th>Amount (₹)</th>
                        <th>Date</th>
                        <th>Payment Method</th>
                        <th>Transaction ID</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- rows added by JS -->
                </tbody>
            </table>
        </div>
    </section>

    <script src="js/dashboard.js"></script>
</body>
</html>
